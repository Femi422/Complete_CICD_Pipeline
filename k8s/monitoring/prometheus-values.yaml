prometheus:
  prometheusSpec:
    # Scrape any pod with prometheus.io/scrape="true" annotation
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    additionalScrapeConfigs:
      - job_name: ecommerce-nginx
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [production]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1

alertmanager:
  config:
    global:
      slack_api_url: "YOUR_SLACK_WEBHOOK_URL"
    route:
      receiver: slack-alerts
      group_by: [alertname, namespace]
    receivers:
      - name: slack-alerts
        slack_configs:
          - channel: "#ops-alerts"
            title: "{{ .GroupLabels.alertname }}"
            text: "{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}"

grafana:
  adminPassword: "changeme-in-prod"
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: Ecommerce
          type: file
          options:
            path: /var/lib/grafana/dashboards
  dashboards:
    default:
      nginx-dashboard:
        gnetId: 14900   # "NGINX Prometheus Exporter" from grafana.com
        datasource: Prometheus
      kubernetes-dashboard:
        gnetId: 6417    # "Kubernetes Cluster" dashboard
        datasource: Prometheus
